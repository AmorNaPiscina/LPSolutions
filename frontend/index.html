<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgendaMercado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card auth-card--wide">
      <div style="text-align:center; margin-bottom:32px;">
        <div style="display:inline-flex;align-items:center;gap:12px;margin-bottom:14px;">
          <div class="brand-mark" style="width:44px;height:44px;border-radius:12px;font-size:22px;">📦</div>
          <span style="font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.6px;">AgendaMercado</span>
        </div>
        <p style="font-size:14px;color:var(--muted);">Sistema de agendamento de entregas</p>
      </div>

      <p style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;text-align:center;margin-bottom:4px;">
        Selecione seu perfil
      </p>

      <div class="role-grid">
        <a href="login-fornecedor.html" class="role-card">
          <span class="role-icon">🚚</span>
          <span class="role-title">Fornecedor</span>
          <span class="role-desc">Solicitar e gerenciar agendamentos de entrega</span>
        </a>
        <a href="login-recebedor.html" class="role-card">
          <span class="role-icon">🏪</span>
          <span class="role-title">Recebedor</span>
          <span class="role-desc">Aprovar e gerenciar a agenda de recebimento</span>
        </a>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
</body>
</html>
