<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Receção - AgendaMercado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="#" class="brand">
        <div class="brand-mark">📦</div>
        <span class="brand-name">AgendaMercado</span>
      </a>
      <div class="header-right">
        <div class="user-chip">
          <div class="user-avatar" id="user-initial">A</div>
          <span id="nome-recebedor">Carregando...</span>
        </div>
        <button class="icon-btn" onclick="toggleDarkMode()" title="Alternar tema">☀️</button>
        <button class="btn btn-danger" onclick="logout('recebedor')" style="width:auto;">Sair</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="msg"></div>
    <div class="stats" id="stats"></div>

    <!-- CRIAR AGENDAMENTO -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Criar Agendamento</h2>
      </div>

      <div style="background:var(--hi);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;">
        <div class="info-box">
          <strong>⚠️ Horários Bloqueados:</strong> Segundas e Quintas das 10:00 às 12:00 (Coleta no Ceasa)
        </div>

        <form id="form-criar" onsubmit="criarAgendamentoAdmin(event)">
          <div class="form-group">
            <label>Fornecedor</label>
            <select id="fornecedor-select" required>
              <option value="">Selecione um fornecedor...</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Data</label>
              <input type="date" id="data-admin" required />
            </div>
            <div class="form-group">
              <label>Tipo de Mercadoria</label>
              <input type="text" id="tipo-admin" placeholder="Ex: Hortifrutti" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Hora Início</label>
              <input type="time" id="horaini-admin" required />
            </div>
            <div class="form-group">
              <label>Duração (min)</label>
              <input type="number" id="tempo-admin" min="15" step="15" value="30" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Hora Fim (calculado)</label>
              <input type="time" id="horafim-admin" readonly />
            </div>
            <div class="form-group">
              <label>Volume</label>
              <select id="volume-admin" required>
                <option value="Pequeno">Pequeno</option>
                <option value="Médio" selected>Médio</option>
                <option value="Grande">Grande</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="obs-admin" rows="2" placeholder="Informações adicionais..."></textarea>
          </div>
          <div id="msg-criar"></div>
          <button type="submit" class="btn btn-primary">Criar Agendamento</button>
        </form>
      </div>
    </div>

    <!-- EDITAR PERFIL -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="togglePerfil()">
        <h2 class="card-title">Editar Perfil</h2>
        <span id="perfil-toggle-icon" style="font-size:18px;color:var(--muted);">﹢</span>
      </div>
      <div id="form-perfil-wrap" style="display:none;margin-top:20px;">
        <div id="msg-perfil"></div>
        <div class="form-row">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" id="perfil-nome" placeholder="Seu nome" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="perfil-email" placeholder="admin@email.com" />
          </div>
        </div>
        <button class="btn btn-primary" onclick="salvarPerfil()" style="max-width:220px;">Salvar Alterações</button>
      </div>
    </div>

    <!-- ALTERAR SENHA -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleSenha()">
        <h2 class="card-title">Alterar Senha</h2>
        <span id="senha-toggle-icon" style="font-size:18px;color:var(--muted);">﹢</span>
      </div>
      <div id="form-senha-wrap" style="display:none;margin-top:20px;">
        <div id="msg-senha"></div>
        <div class="form-row">
          <div class="form-group">
            <label>Senha Atual</label>
            <input type="password" id="senha-atual" placeholder="••••••••" />
          </div>
          <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="nova-senha" placeholder="Mínimo 8 caracteres" />
          </div>
        </div>
        <div class="form-group">
          <label>Confirmar Nova Senha</label>
          <input type="password" id="confirmar-senha" placeholder="Repita a nova senha" />
        </div>
        <button class="btn btn-primary" onclick="alterarSenha()" style="max-width:200px;">Salvar Senha</button>
      </div>
    </div>

    <!-- CALENDÁRIO -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Agenda de Receção</h2>
      </div>
      <div class="calendar-grid" id="calendario"></div>
      <div id="dia-detalhe"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    let recebedor = null;
    let agendamentos = [];
    let fornecedores = [];
    let diaSelecionado = null;

    window.addEventListener('DOMContentLoaded', () => {
      recebedor = verificarLoginRecebedor();
      if (recebedor) {
        document.getElementById('nome-recebedor').textContent = recebedor.nome;
        document.getElementById('user-initial').textContent = (recebedor.nome || 'A').charAt(0);
        document.getElementById('data-admin').min = new Date().toISOString().split('T')[0];
        carregarAgendamentos();
        carregarFornecedores();
        configurarCalculo();
      }
    });

    async function carregarFornecedores() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/fornecedores`);
        fornecedores = await res.json();
        const select = document.getElementById('fornecedor-select');
        fornecedores.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.id; opt.textContent = f.nome_empresa;
          select.appendChild(opt);
        });
      } catch (err) { console.error('Erro ao carregar fornecedores:', err); }
    }

    function configurarCalculo() {
      const calc = () => {
        const inicio = document.getElementById('horaini-admin').value;
        const tempo  = document.getElementById('tempo-admin').value;
        if (inicio && tempo) {
          const [h, m] = inicio.split(':').map(Number);
          const total = h * 60 + m + parseInt(tempo);
          document.getElementById('horafim-admin').value =
            `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
        }
      };
      document.getElementById('horaini-admin').addEventListener('change', calc);
      document.getElementById('tempo-admin').addEventListener('input', calc);
      document.getElementById('data-admin').addEventListener('change', validarBloqueioAoDigitar);
      document.getElementById('horaini-admin').addEventListener('change', validarBloqueioAoDigitar);
    }

    function validarBloqueioAoDigitar() {
      const data    = document.getElementById('data-admin').value;
      const horaini = document.getElementById('horaini-admin').value;
      const horafim = document.getElementById('horafim-admin').value;
      if (data && horaini && horafim) {
        const v = validarHorarioBloqueado(data, horaini, horafim);
        if (v.bloqueado) mostrarErro('msg-criar', `❌ Horário bloqueado: ${v.motivo} (${v.periodo})`);
        else document.getElementById('msg-criar').innerHTML = '';
      }
    }

    async function carregarAgendamentos() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/agendamentos`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        agendamentos = await res.json();
        renderizar();
        if (diaSelecionado) verDia(diaSelecionado);
      } catch (err) {
        mostrarErro('msg', 'Erro ao carregar agendamentos. O servidor pode estar iniciando — tente novamente.');
      }
    }

    function renderizar() {
      const pendentes = agendamentos.filter(a => a.status === 'Pendente').length;
      const aprovados = agendamentos.filter(a => a.status === 'Aprovado').length;
      const recusados = agendamentos.filter(a => a.status === 'Recusado').length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><h3>${pendentes}</h3><p>Pendentes</p></div>
        <div class="stat-card"><h3>${aprovados}</h3><p>Aprovados</p></div>
        <div class="stat-card"><h3>${recusados}</h3><p>Recusados</p></div>
        <div class="stat-card"><h3>${agendamentos.length}</h3><p>Total</p></div>
      `;
      renderizarCalendario();
    }

    function renderizarCalendario() {
      const hoje = new Date();
      let html = '';
      for (let i = 0; i < 14; i++) {
        const data = new Date(hoje);
        data.setDate(hoje.getDate() + i);
        const dataStr = data.toISOString().split('T')[0];
        const count = agendamentos.filter(ag => ag.data_entrega.split('T')[0] === dataStr).length;
        html += `
          <div class="calendar-day" onclick="verDia('${dataStr}')">
            <div class="calendar-day-num">${data.getDate()}</div>
            <div class="calendar-day-week">${data.toLocaleDateString('pt-BR', {weekday: 'short'})}</div>
            ${count > 0 ? `<div class="calendar-day-count">${count}</div>` : ''}
          </div>`;
      }
      document.getElementById('calendario').innerHTML = html;
    }

    function cardAgendamento(ag) {
      const hoje = new Date().toISOString().split('T')[0];
      let botoes = '';
      if (ag.status === 'Pendente') {
        botoes = `
          <button class="btn btn-success" onclick="aprovar(${ag.id})" style="width:auto;">Aprovar</button>
          <button class="btn btn-danger"  onclick="recusar(${ag.id})"  style="width:auto;">Recusar</button>
          <button class="btn btn-warning" onclick="toggleReagendar(${ag.id})" style="width:auto;">Reagendar</button>
        `;
      } else {
        botoes = `
          <button class="btn btn-warning" onclick="toggleReagendar(${ag.id})" style="width:auto;">Reagendar</button>
          <button class="btn btn-danger"  onclick="cancelarAgendamento(${ag.id})" style="width:auto;">Cancelar</button>
        `;
      }

      return `
        <div class="ag-detail ag-detail-${ag.status.toLowerCase()}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;">
            <div class="ag-title" style="margin-bottom:0;">${ag.nome_empresa || 'Fornecedor'}</div>
            <span class="status-badge badge-${ag.status.toLowerCase()}">${ag.status}</span>
          </div>
          <div class="ag-row"><strong>Mercadoria:</strong> ${ag.tipo_mercadoria} (${ag.volume})</div>
          <div class="ag-row"><strong>Horário:</strong> ${ag.horario_inicio} — ${ag.horario_fim}</div>
          <div class="ag-row"><strong>Contato:</strong> ${ag.nome_contato || 'N/A'} · ${ag.telefone || 'N/A'}</div>
          ${ag.observacoes ? `<div class="ag-row" style="margin-top:4px;font-size:12px;color:var(--faint);">${ag.observacoes}</div>` : ''}
          <div class="ag-actions">${botoes}</div>
          <div class="reagendar-form" id="reagendar-${ag.id}">
            <p>⚡ Propor novo horário — voltará para Pendente</p>
            <div class="reagendar-fields">
              <div><label>Data</label><input type="date" id="rd-data-${ag.id}" min="${hoje}" /></div>
              <div><label>Hora Início</label><input type="time" id="rd-hora-${ag.id}" /></div>
              <div><label>Duração (min)</label><input type="number" id="rd-tempo-${ag.id}" min="15" step="15" value="${ag.tempo_estimado || 30}" /></div>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="reagendar(${ag.id})" class="btn btn-warning" style="width:auto;font-size:12px;padding:6px 14px;">Confirmar</button>
              <button onclick="toggleReagendar(${ag.id})" class="btn btn-secondary" style="width:auto;font-size:12px;padding:6px 14px;">Cancelar</button>
            </div>
          </div>
        </div>`;
    }

    function verDia(dataStr) {
      diaSelecionado = dataStr;
      const agendsDoDia = agendamentos.filter(ag => ag.data_entrega.split('T')[0] === dataStr);
      const dataFormatada = new Date(dataStr + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

      let html = `<div style="margin-bottom:16px;"><span style="font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.3px;">${dataFormatada}</span></div>`;

      if (agendsDoDia.length === 0) {
        html += `<div style="text-align:center;padding:32px;color:var(--muted);">
          <div style="font-size:28px;margin-bottom:8px;">📭</div>
          <p style="font-size:14px;">Nenhum agendamento neste dia</p>
        </div>`;
      } else {
        agendsDoDia.forEach(ag => { html += cardAgendamento(ag); });
      }

      html += `<button class="btn btn-secondary" onclick="diaSelecionado=null;renderizar()" style="margin-top:12px;width:auto;">Fechar</button>`;
      document.getElementById('dia-detalhe').innerHTML = html;
    }

    function toggleReagendar(id) {
      const el = document.getElementById(`reagendar-${id}`);
      el.style.display = el.style.display === 'none' || el.style.display === '' ? 'block' : 'none';
    }

    async function reagendar(id) {
      const data  = document.getElementById(`rd-data-${id}`).value;
      const hora  = document.getElementById(`rd-hora-${id}`).value;
      const tempo = parseInt(document.getElementById(`rd-tempo-${id}`).value);
      if (!data || !hora || !tempo) { mostrarErro('msg', 'Preencha data, hora e duração.'); return; }
      const [h, m] = hora.split(':').map(Number);
      const total = h * 60 + m + tempo;
      const fim = `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
      const v = validarHorarioBloqueado(data, hora, fim);
      if (v.bloqueado) { mostrarErro('msg', `❌ Horário bloqueado: ${v.motivo} (${v.periodo})`); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/agendamentos/${id}/reagendar`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data_entrega: data, horario_inicio: hora, horario_fim: fim, tempo_estimado: tempo })
        });
        const resultado = await res.json();
        if (res.ok) { mostrarSucesso('msg', 'Reagendado! Status voltou para Pendente.'); carregarAgendamentos(); }
        else { mostrarErro('msg', resultado.erro || 'Erro ao reagendar'); }
      } catch { mostrarErro('msg', 'Erro de conexão'); }
    }

    async function criarAgendamentoAdmin(e) {
      e.preventDefault();
      const horafim = document.getElementById('horafim-admin').value;
      if (!horafim) { mostrarErro('msg-criar', 'Selecione a hora de início para calcular o fim.'); return; }
      const data    = document.getElementById('data-admin').value;
      const horaini = document.getElementById('horaini-admin').value;
      const v = validarHorarioBloqueado(data, horaini, horafim);
      if (v.bloqueado) { mostrarErro('msg-criar', `❌ Não é possível agendar: ${v.motivo}`); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/agendamentos`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fornecedor_id: document.getElementById('fornecedor-select').value,
            data_entrega: data, horario_inicio: horaini, horario_fim: horafim,
            tipo_mercadoria: document.getElementById('tipo-admin').value,
            volume: document.getElementById('volume-admin').value,
            tempo_estimado: parseInt(document.getElementById('tempo-admin').value),
            observacoes: document.getElementById('obs-admin').value,
            status: 'Aprovado'
          })
        });
        const resultado = await res.json();
        if (res.ok) {
          mostrarSucesso('msg-criar', 'Agendamento criado com sucesso!');
          document.getElementById('form-criar').reset();
          document.getElementById('horafim-admin').value = '';
          setTimeout(() => carregarAgendamentos(), 1500);
        } else {
          mostrarErro('msg-criar', resultado.erro || 'Erro ao criar agendamento');
        }
      } catch { mostrarErro('msg-criar', 'Erro de conexão'); }
    }

    async function aprovar(id) {
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/agendamentos/${id}/aprovar`, { method: 'PUT' });
        const resultado = await res.json();
        if (res.ok) { mostrarSucesso('msg', 'Agendamento aprovado!'); carregarAgendamentos(); }
        else { mostrarErro('msg', resultado.erro || 'Erro ao aprovar'); }
      } catch { mostrarErro('msg', 'Erro de conexão'); }
    }

    async function recusar(id) {
      if (confirm('Recusar este agendamento?')) {
        try {
          const res = await fetch(`${CONFIG.API_URL}/api/agendamentos/${id}/recusar`, { method: 'PUT' });
          const resultado = await res.json();
          if (res.ok) { mostrarSucesso('msg', 'Agendamento recusado.'); carregarAgendamentos(); }
          else { mostrarErro('msg', resultado.erro || 'Erro ao recusar'); }
        } catch { mostrarErro('msg', 'Erro de conexão'); }
      }
    }

    async function cancelarAgendamento(id) {
      if (confirm('⚠️ Cancelar e remover este agendamento definitivamente?')) {
        try {
          const res = await fetch(`${CONFIG.API_URL}/api/agendamentos/${id}`, { method: 'DELETE' });
          if (res.ok) { mostrarSucesso('msg', 'Agendamento cancelado.'); carregarAgendamentos(); }
          else { const r = await res.json(); mostrarErro('msg', r.erro || 'Erro ao cancelar'); }
        } catch { mostrarErro('msg', 'Erro de conexão'); }
      }
    }

    function togglePerfil() {
      const wrap = document.getElementById('form-perfil-wrap');
      const icon = document.getElementById('perfil-toggle-icon');
      const open = wrap.style.display === 'none' || wrap.style.display === '';
      wrap.style.display = open ? 'block' : 'none';
      icon.textContent = open ? '﹣' : '﹢';
      if (open) {
        document.getElementById('perfil-nome').value  = recebedor.nome  || '';
        document.getElementById('perfil-email').value = recebedor.email || '';
      }
    }

    async function salvarPerfil() {
      const nome  = document.getElementById('perfil-nome').value.trim();
      const email = document.getElementById('perfil-email').value.trim();

      if (!nome || !email) {
        mostrarErro('msg-perfil', 'Nome e email são obrigatórios.');
        return;
      }

      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/admin/perfil`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: recebedor.id, nome, email })
        });
        const resultado = await res.json();
        if (res.ok) {
          recebedor = { ...recebedor, nome, email };
          salvarDados(CONFIG.STORAGE.RECEBEDOR, recebedor);
          document.getElementById('nome-recebedor').textContent = nome;
          document.getElementById('user-initial').textContent = nome.charAt(0);
          mostrarSucesso('msg-perfil', 'Perfil atualizado com sucesso!');
        } else {
          mostrarErro('msg-perfil', resultado.erro || 'Erro ao atualizar perfil');
        }
      } catch { mostrarErro('msg-perfil', 'Erro de conexão'); }
    }

    function toggleSenha() {
      const wrap = document.getElementById('form-senha-wrap');
      const icon = document.getElementById('senha-toggle-icon');
      const open = wrap.style.display === 'none' || wrap.style.display === '';
      wrap.style.display = open ? 'block' : 'none';
      icon.textContent = open ? '﹣' : '﹢';
      if (!open) {
        document.getElementById('senha-atual').value = '';
        document.getElementById('nova-senha').value = '';
        document.getElementById('confirmar-senha').value = '';
        document.getElementById('msg-senha').innerHTML = '';
      }
    }

    async function alterarSenha() {
      const senhaAtual = document.getElementById('senha-atual').value;
      const novaSenha  = document.getElementById('nova-senha').value;
      const confirmar  = document.getElementById('confirmar-senha').value;
      if (!senhaAtual || !novaSenha || !confirmar) { mostrarErro('msg-senha', 'Preencha todos os campos.'); return; }
      if (novaSenha.length < 8) { mostrarErro('msg-senha', 'Nova senha deve ter mínimo 8 caracteres.'); return; }
      if (novaSenha !== confirmar) { mostrarErro('msg-senha', 'As senhas não coincidem.'); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/admin/alterar-senha`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: recebedor.email, senha_atual: senhaAtual, nova_senha: novaSenha })
        });
        const resultado = await res.json();
        if (res.ok) {
          mostrarSucesso('msg-senha', 'Senha alterada com sucesso!');
          document.getElementById('senha-atual').value = '';
          document.getElementById('nova-senha').value = '';
          document.getElementById('confirmar-senha').value = '';
        } else {
          mostrarErro('msg-senha', resultado.erro || 'Erro ao alterar senha');
        }
      } catch { mostrarErro('msg-senha', 'Erro de conexão'); }
    }
  </script>
</body>
</html>
