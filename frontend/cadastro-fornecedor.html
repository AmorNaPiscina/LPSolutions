<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - AgendaMercado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card" style="max-width:480px;">
      <a href="login-fornecedor.html" class="auth-brand">
        <div class="brand-mark">📦</div>
        <span class="brand-name">AgendaMercado</span>
      </a>

      <h2 class="auth-title">Criar conta</h2>
      <p class="auth-subtitle">Preencha os dados da sua empresa para começar.</p>

      <div id="msg"></div>

      <form onsubmit="fazerCadastro(event)">
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input type="text" id="empresa" placeholder="Distribuidora XYZ Ltda." required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Nome do Contato</label>
            <input type="text" id="contato" placeholder="João Silva" required />
          </div>
          <div class="form-group">
            <label>Telefone / WhatsApp</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="contato@empresa.com" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha1" placeholder="Mínimo 8 caracteres" minlength="8" required />
          </div>
          <div class="form-group">
            <label>Confirmar senha</label>
            <input type="password" id="senha2" placeholder="Repita a senha" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Criar Conta</button>
        <a href="login-fornecedor.html" class="link-btn">Já tenho uma conta</a>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function fazerCadastro(e) {
      e.preventDefault();
      const s1 = document.getElementById('senha1').value;
      const s2 = document.getElementById('senha2').value;
      if (s1 !== s2) { mostrarErro('msg', 'As senhas não coincidem'); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/fornecedor/cadastro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome_empresa: document.getElementById('empresa').value,
            nome_contato: document.getElementById('contato').value,
            telefone:     document.getElementById('telefone').value,
            email:        document.getElementById('email').value,
            senha: s1
          })
        });
        const data = await res.json();
        if (res.ok) {
          mostrarSucesso('msg', 'Conta criada com sucesso! Redirecionando...');
          setTimeout(() => { window.location.href = 'login-fornecedor.html'; }, 2000);
        } else {
          mostrarErro('msg', data.erro || 'Erro ao criar conta');
        }
      } catch (err) {
        mostrarErro('msg', 'Erro de conexão com o servidor');
      }
    }
  </script>
</body>
</html>
