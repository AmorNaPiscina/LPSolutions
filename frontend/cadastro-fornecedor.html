<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Fornecedor - AgendaMercado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box" style="max-width: 480px;">
      <h2>Criar Conta</h2>
      <p>Preencha os dados da sua empresa</p>

      <div id="msg"></div>

      <form onsubmit="fazerCadastro(event)">
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input type="text" id="empresa" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Contato</label>
            <input type="text" id="contato" required />
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha1" minlength="8" required />
          </div>
          <div class="form-group">
            <label>Confirmar</label>
            <input type="password" id="senha2" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Criar Conta</button>

        <button type="button" class="link-btn" onclick="window.location.href='login-fornecedor.html'">
          Já tenho conta
        </button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function fazerCadastro(e) {
      e.preventDefault();
      
      const s1 = document.getElementById('senha1').value;
      const s2 = document.getElementById('senha2').value;

      if (s1 !== s2) {
        mostrarErro('msg', 'Senhas não coincidem');
        return;
      }

      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/fornecedor/cadastro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome_empresa: document.getElementById('empresa').value,
            nome_contato: document.getElementById('contato').value,
            telefone: document.getElementById('telefone').value,
            email: document.getElementById('email').value,
            senha: s1
          })
        });

        const data = await res.json();
        if (res.ok) {
          mostrarSucesso('msg', 'Conta criada! Redirecionando...');
          setTimeout(() => {
            window.location.href = 'login-fornecedor.html';
          }, 2000);
        } else {
          mostrarErro('msg', data.erro || 'Erro ao criar conta');
        }
      } catch (err) {
        mostrarErro('msg', 'Erro de conexão');
      }
    }
  </script>
</body>
</html>
