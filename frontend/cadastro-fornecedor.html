<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Fornecedor - Sistema de Agendamento</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card" style="max-width: 500px;">
      <h2>📝 Criar Conta</h2>
      
      <div id="mensagem-container"></div>
      
      <form id="form-cadastro">
        <div class="form-group">
          <label>Nome da Empresa *</label>
          <input type="text" id="nome_empresa" required />
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Nome do Contato *</label>
            <input type="text" id="nome_contato" required />
          </div>
          <div class="form-group">
            <label>Telefone *</label>
            <input type="tel" id="telefone" placeholder="(44) 99999-9999" required />
          </div>
        </div>
        
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" required />
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Senha * (mínimo 6 caracteres)</label>
            <input type="password" id="senha" minlength="6" required />
          </div>
          <div class="form-group">
            <label>Confirmar Senha *</label>
            <input type="password" id="confirmar_senha" required />
          </div>
        </div>
        
        <button type="submit" class="btn btn-success" style="width: 100%; margin-bottom: 12px;">
          Criar Conta
        </button>
        
        <button type="button" class="link-button" style="width: 100%;" onclick="window.location.href='login-fornecedor.html'">
          Já tenho conta - Fazer Login
        </button>
      </form>
    </div>
  </div>
  
  <script src="js/config.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
