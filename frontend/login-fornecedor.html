<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Fornecedor - AgendaMercado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <a href="index.html" class="auth-brand">
        <div class="brand-mark">📦</div>
        <span class="brand-name">AgendaMercado</span>
      </a>

      <h2 class="auth-title">Bem-vindo de volta</h2>
      <p class="auth-subtitle">Acesse sua conta de fornecedor para gerenciar seus agendamentos.</p>

      <div id="msg"></div>

      <form onsubmit="fazerLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
        <a href="cadastro-fornecedor.html" class="link-btn">Não tem conta? Criar agora</a>
        <div style="margin-top:14px;">
          <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">← Voltar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function fazerLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/fornecedor/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (res.ok) {
          salvarDados(CONFIG.STORAGE.FORNECEDOR, data.fornecedor);
          mostrarSucesso('msg', 'Login realizado!');
          setTimeout(() => { window.location.href = 'area-fornecedor.html'; }, 800);
        } else {
          mostrarErro('msg', data.erro || 'Erro ao fazer login');
        }
      } catch (err) {
        mostrarErro('msg', 'Erro de conexão com o servidor');
      }
    }
  </script>
</body>
</html>
