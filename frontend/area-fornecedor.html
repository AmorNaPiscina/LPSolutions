<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Fornecedor - Sistema de Agendamento</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🏪 Sistema de Agendamento - Mercado</h1>
      <div>
        <span style="margin-right: 16px; color: #7f8c8d;">Olá, <strong id="nome-fornecedor"></strong>!</span>
        <button class="btn btn-danger" onclick="fazerLogout()">Sair</button>
      </div>
    </div>

    <!-- Mensagens -->
    <div id="mensagem-container"></div>

    <!-- Estatísticas -->
    <div class="stats" id="stats-container">
      <!-- Será preenchido via JavaScript -->
    </div>

    <!-- Card Principal -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-size: 22px; color: #2c3e50;">Meus Agendamentos</h2>
        <button class="btn btn-primary" onclick="toggleNovoAgendamento()">
          <span id="btn-texto">+ Novo Agendamento</span>
        </button>
      </div>

      <!-- Formulário Novo Agendamento -->
      <div id="form-novo-agendamento" style="display: none; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 24px;">
        <h3 style="font-size: 18px; margin-bottom: 16px; color: #2c3e50;">Criar Novo Agendamento</h3>
        
        <div class="alert-info" style="font-size: 13px;">
          <strong>Horários:</strong> Seg-Sex, 08:00-12:00 e 14:00-17:00 | <strong>Bloqueios:</strong> Seg/Qui 10:00-12:00 (Ceasa)
        </div>

        <form id="form-agendamento">
          <div class="form-row">
            <div class="form-group">
              <label>Data da Entrega *</label>
              <input type="date" id="data_entrega" required />
            </div>
            <div class="form-group">
              <label>Tipo de Mercadoria *</label>
              <input type="text" id="tipo_mercadoria" placeholder="Ex: Bebidas, Alimentos" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Horário de Início *</label>
              <input type="time" id="horario_inicio" required />
            </div>
            <div class="form-group">
              <label>Tempo Estimado (minutos) *</label>
              <input type="number" id="tempo_estimado" min="15" step="15" value="30" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Horário de Término</label>
              <input type="time" id="horario_fim" readonly style="background: #ecf0f1;" />
            </div>
            <div class="form-group">
              <label>Volume *</label>
              <select id="volume" required>
                <option value="Pequeno">Pequeno</option>
                <option value="Médio" selected>Médio</option>
                <option value="Grande">Grande</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Observações</label>
            <textarea id="observacoes" rows="3"></textarea>
          </div>

          <button type="submit" class="btn btn-success" style="width: 100%;">Criar Agendamento</button>
        </form>
      </div>

      <!-- Lista de Agendamentos -->
      <div id="lista-agendamentos">
        <!-- Será preenchido via JavaScript -->
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/area-fornecedor.js"></script>
</body>
</html>
