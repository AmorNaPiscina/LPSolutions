<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Conta - AgendaMercado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="#" class="brand">
        <div class="brand-mark">📦</div>
        <span class="brand-name">AgendaMercado</span>
      </a>
      <div class="header-right">
        <div class="user-chip">
          <div class="user-avatar" id="user-initial">?</div>
          <span id="nome-fornecedor">Carregando...</span>
        </div>
        <button class="icon-btn" onclick="toggleDarkMode()" title="Alternar tema">☀️</button>
        <button class="btn btn-danger" onclick="logout('fornecedor')" style="width:auto;">Sair</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="msg"></div>
    <div class="stats" id="stats"></div>

    <!-- AGENDAMENTOS -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Meus Agendamentos</h2>
        <button class="btn btn-primary" onclick="toggleForm()" style="width:auto;padding:8px 18px;">+ Novo</button>
      </div>

      <div id="form-agend" style="display:none; background:var(--hi); border:1px solid var(--border); border-radius:var(--r-lg); padding:20px; margin-bottom:20px;">
        <h3 style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;">Novo Agendamento</h3>

        <div class="info-box">
          <strong>📅 Horário de atendimento:</strong> Segunda a Sexta — Manhã: 08:00–12:00 &nbsp;·&nbsp; Tarde: 14:00–17:00<br/>
          <strong>⚠️ Ceasa:</strong> Segundas e Quintas, 10:00–12:00 bloqueado
        </div>

        <form onsubmit="criarAgendamento(event)">
          <div class="form-row">
            <div class="form-group">
              <label>Data</label>
              <input type="date" id="data" required />
            </div>
            <div class="form-group">
              <label>Tipo de Mercadoria</label>
              <input type="text" id="tipo" placeholder="Ex: Hortifrutti" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Hora Início</label>
              <input type="time" id="horaini" min="08:00" max="17:00" required />
            </div>
            <div class="form-group">
              <label>Duração (min)</label>
              <input type="number" id="tempo" min="15" max="240" step="15" value="30" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Hora Fim (calculado)</label>
              <input type="time" id="horafim" readonly />
            </div>
            <div class="form-group">
              <label>Volume</label>
              <select id="volume" required>
                <option value="Pequeno">Pequeno</option>
                <option value="Médio" selected>Médio</option>
                <option value="Grande">Grande</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="obs" rows="3" placeholder="Informações adicionais..."></textarea>
          </div>
          <div id="msg-form"></div>
          <div style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary" style="flex:1;">Solicitar Agendamento</button>
            <button type="button" class="btn btn-secondary" onclick="toggleForm()" style="flex:1;">Cancelar</button>
          </div>
        </form>
      </div>

      <div id="lista"></div>
    </div>

    <!-- EDITAR PERFIL -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="togglePerfil()">
        <h2 class="card-title">Editar Perfil</h2>
        <span id="perfil-toggle-icon" style="font-size:18px;color:var(--muted);">﹢</span>
      </div>
      <div id="form-perfil-wrap" style="display:none;margin-top:20px;">
        <div id="msg-perfil"></div>
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input type="text" id="perfil-empresa" placeholder="Distribuidora XYZ Ltda." />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nome do Contato</label>
            <input type="text" id="perfil-contato" placeholder="João Silva" />
          </div>
          <div class="form-group">
            <label>Telefone / WhatsApp</label>
            <input type="tel" id="perfil-telefone" placeholder="(11) 99999-9999" />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="perfil-email" placeholder="contato@empresa.com" />
        </div>
        <button class="btn btn-primary" onclick="salvarPerfil()" style="max-width:220px;">Salvar Alterações</button>
      </div>
    </div>

    <!-- ALTERAR SENHA -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleSenha()">
        <h2 class="card-title">Alterar Senha</h2>
        <span id="senha-toggle-icon" style="font-size:18px;color:var(--muted);">﹢</span>
      </div>
      <div id="form-senha-wrap" style="display:none;margin-top:20px;">
        <div id="msg-senha"></div>
        <div class="form-row">
          <div class="form-group">
            <label>Senha Atual</label>
            <input type="password" id="senha-atual" placeholder="••••••••" />
          </div>
          <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="nova-senha" placeholder="Mínimo 8 caracteres" />
          </div>
        </div>
        <div class="form-group">
          <label>Confirmar Nova Senha</label>
          <input type="password" id="confirmar-senha" placeholder="Repita a nova senha" />
        </div>
        <button class="btn btn-primary" onclick="alterarSenha()" style="max-width:200px;">Salvar Senha</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    let fornecedor = null;
    let agendamentos = [];

    window.addEventListener('DOMContentLoaded', () => {
      fornecedor = verificarLoginFornecedor();
      if (fornecedor) {
        document.getElementById('nome-fornecedor').textContent = fornecedor.nome_empresa;
        document.getElementById('user-initial').textContent = fornecedor.nome_empresa.charAt(0);
        document.getElementById('data').min = new Date().toISOString().split('T')[0];
        carregarAgendamentos();
        configurarCalculo();
      }
    });

    function toggleForm() {
      const form = document.getElementById('form-agend');
      form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
      if (form.style.display === 'none') {
        form.querySelector('form').reset();
        document.getElementById('horafim').value = '';
        document.getElementById('msg-form').innerHTML = '';
      }
    }

    function configurarCalculo() {
      const calc = () => {
        const inicio = document.getElementById('horaini').value;
        const tempo = document.getElementById('tempo').value;
        if (inicio && tempo) {
          const [h, m] = inicio.split(':').map(Number);
          const total = h * 60 + m + parseInt(tempo);
          document.getElementById('horafim').value =
            `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
        }
        validarBloqueio();
      };
      document.getElementById('horaini').addEventListener('change', calc);
      document.getElementById('tempo').addEventListener('input', calc);
      document.getElementById('data').addEventListener('change', () => {
        const val = document.getElementById('data').value;
        if (ehFimDeSemana(val)) {
          mostrarErro('msg-form', '❌ Atendimento apenas de segunda a sexta-feira.');
          document.getElementById('data').value = '';
        } else {
          validarBloqueio();
        }
      });
    }

    function validarBloqueio() {
      const data = document.getElementById('data').value;
      const horaini = document.getElementById('horaini').value;
      const horafim = document.getElementById('horafim').value;
      if (data && horaini && horafim) {
        const v = validarHorarioBloqueado(data, horaini, horafim);
        if (v.bloqueado) {
          mostrarErro('msg-form', `❌ Horário bloqueado: ${v.motivo} (${v.periodo})`);
        } else {
          document.getElementById('msg-form').innerHTML = '';
        }
      }
    }

    async function carregarAgendamentos() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/fornecedor/${fornecedor.id}/agendamentos`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        agendamentos = await res.json();
        renderizar();
      } catch (err) {
        mostrarErro('msg', 'Erro ao carregar agendamentos. O servidor pode estar iniciando — tente novamente.');
      }
    }

    function renderizar() {
      const pendentes = agendamentos.filter(a => a.status === 'Pendente').length;
      const aprovados = agendamentos.filter(a => a.status === 'Aprovado').length;
      const recusados = agendamentos.filter(a => a.status === 'Recusado').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><h3>${pendentes}</h3><p>Pendentes</p></div>
        <div class="stat-card"><h3>${aprovados}</h3><p>Aprovados</p></div>
        <div class="stat-card"><h3>${recusados}</h3><p>Recusados</p></div>
        <div class="stat-card"><h3>${agendamentos.length}</h3><p>Total</p></div>
      `;

      const hoje = new Date().toISOString().split('T')[0];
      const pend = agendamentos.filter(a => a.status === 'Pendente');
      const apr  = agendamentos.filter(a => a.status === 'Aprovado');
      const rec  = agendamentos.filter(a => a.status === 'Recusado');

      let lista = '';

      if (pend.length > 0) {
        lista += '<div class="section-label">⏳ Pendentes</div>';
        pend.forEach(ag => { lista += cardFornecedor(ag, hoje); });
      }
      if (apr.length > 0) {
        lista += '<div class="section-label">✅ Aprovados</div>';
        apr.forEach(ag => { lista += cardFornecedor(ag, hoje); });
      }
      if (rec.length > 0) {
        lista += '<div class="section-label">❌ Recusados</div>';
        rec.forEach(ag => { lista += cardFornecedor(ag, hoje); });
      }

      document.getElementById('lista').innerHTML = lista ||
        `<div style="text-align:center;padding:40px;color:var(--muted);">
          <div style="font-size:32px;margin-bottom:10px;">📭</div>
          <p style="font-size:14px;font-weight:500;">Nenhum agendamento futuro</p>
          <p style="font-size:13px;margin-top:4px;">Clique em "+ Novo" para solicitar um agendamento</p>
        </div>`;
    }

    function cardFornecedor(ag, hoje) {
      let botoes = '';
      if (ag.status === 'Pendente') {
        botoes = `
          <button class="btn btn-warning" onclick="toggleReagendar(${ag.id})" style="width:auto;font-size:12px;padding:6px 12px;">Reagendar</button>
          <button class="btn btn-danger"  onclick="cancelarAgendamento(${ag.id})" style="width:auto;font-size:12px;padding:6px 12px;">Cancelar</button>
        `;
      } else if (ag.status === 'Recusado') {
        botoes = `
          <button class="btn btn-warning" onclick="toggleReagendar(${ag.id})" style="width:auto;font-size:12px;padding:6px 12px;">Reagendar</button>
        `;
      }

      const reagendarForm = (ag.status === 'Pendente' || ag.status === 'Recusado') ? `
        <div class="reagendar-form" id="reagendar-${ag.id}">
          <p>⚡ Propor novo horário — voltará para análise</p>
          <div class="reagendar-fields">
            <div><label>Data</label><input type="date" id="rd-data-${ag.id}" min="${hoje}" /></div>
            <div><label>Hora Início</label><input type="time" id="rd-hora-${ag.id}" /></div>
            <div><label>Duração (min)</label><input type="number" id="rd-tempo-${ag.id}" min="15" step="15" value="${ag.tempo_estimado || 30}" /></div>
          </div>
          <div style="display:flex;gap:8px;">
            <button onclick="reagendar(${ag.id})" class="btn btn-warning" style="width:auto;font-size:12px;padding:6px 14px;">Confirmar</button>
            <button onclick="toggleReagendar(${ag.id})" class="btn btn-secondary" style="width:auto;font-size:12px;padding:6px 14px;">Cancelar</button>
          </div>
        </div>
      ` : '';

      return `
        <div class="ag-card ag-card-${ag.status.toLowerCase()}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div>
              <div class="ag-title">${ag.tipo_mercadoria}</div>
              <div class="ag-row">${formatarData(ag.data_entrega)} &nbsp;·&nbsp; ${ag.horario_inicio} — ${ag.horario_fim}</div>
              <div class="ag-row"><strong>Volume:</strong> ${ag.volume}</div>
              ${ag.observacoes ? `<div class="ag-row" style="margin-top:4px;font-size:12px;color:var(--faint);">${ag.observacoes}</div>` : ''}
              ${ag.status === 'Recusado' && ag.motivo_recusa ? `<div class="ag-row" style="margin-top:8px;padding:8px 10px;background:var(--danger-bg);border-radius:6px;border:1px solid rgba(244,63,94,0.2);font-size:12px;color:var(--danger);"><strong>Motivo da recusa:</strong> ${ag.motivo_recusa}</div>` : ''}
            </div>
            <span class="status-badge badge-${ag.status.toLowerCase()}">${ag.status}</span>
          </div>
          ${botoes ? `<div class="ag-actions">${botoes}</div>` : ''}
          ${reagendarForm}
        </div>
      `;
    }

    function toggleReagendar(id) {
      const el = document.getElementById(`reagendar-${id}`);
      el.style.display = el.style.display === 'none' || el.style.display === '' ? 'block' : 'none';
    }

    async function reagendar(id) {
      const data  = document.getElementById(`rd-data-${id}`).value;
      const hora  = document.getElementById(`rd-hora-${id}`).value;
      const tempo = parseInt(document.getElementById(`rd-tempo-${id}`).value);
      if (!data || !hora || !tempo) { mostrarErro('msg', 'Preencha data, hora e duração.'); return; }
      const [h, m] = hora.split(':').map(Number);
      const total = h * 60 + m + tempo;
      const fim = `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
      const v = validarHorarioBloqueado(data, hora, fim);
      if (v.bloqueado) { mostrarErro('msg', `❌ Horário bloqueado: ${v.motivo} (${v.periodo})`); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/agendamentos/${id}/reagendar`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data_entrega: data, horario_inicio: hora, horario_fim: fim, tempo_estimado: tempo })
        });
        const resultado = await res.json();
        if (res.ok) { mostrarSucesso('msg', 'Reagendado! Aguardando aprovação.'); carregarAgendamentos(); }
        else { mostrarErro('msg', resultado.erro || 'Erro ao reagendar'); }
      } catch { mostrarErro('msg', 'Erro de conexão'); }
    }

    async function cancelarAgendamento(id) {
      if (confirm('Cancelar este agendamento?')) {
        try {
          const res = await fetch(`${CONFIG.API_URL}/api/agendamentos/${id}`, { method: 'DELETE' });
          if (res.ok) { mostrarSucesso('msg', 'Agendamento cancelado.'); carregarAgendamentos(); }
          else { const r = await res.json(); mostrarErro('msg', r.erro || 'Erro ao cancelar'); }
        } catch { mostrarErro('msg', 'Erro de conexão'); }
      }
    }

    async function criarAgendamento(e) {
      e.preventDefault();
      const data   = document.getElementById('data').value;
      const inicio = document.getElementById('horaini').value;
      const tempo  = document.getElementById('tempo').value;
      const [h, m] = inicio.split(':').map(Number);
      const totalMin = h * 60 + m + parseInt(tempo);
      const fim = `${String(Math.floor(totalMin / 60)).padStart(2, '0')}:${String(totalMin % 60).padStart(2, '0')}`;
      const v = validarHorarioBloqueado(data, inicio, fim);
      if (v.bloqueado) { mostrarErro('msg-form', `❌ Não é possível agendar: ${v.motivo} (${v.periodo})`); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/agendamentos`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fornecedor_id: fornecedor.id,
            data_entrega: data, horario_inicio: inicio, horario_fim: fim,
            tipo_mercadoria: document.getElementById('tipo').value,
            volume: document.getElementById('volume').value,
            tempo_estimado: parseInt(tempo),
            observacoes: document.getElementById('obs').value,
            status: 'Pendente'
          })
        });
        const resultado = await res.json();
        if (res.ok) {
          mostrarSucesso('msg', 'Agendamento solicitado! Aguardando aprovação.');
          toggleForm();
          setTimeout(() => carregarAgendamentos(), 1000);
        } else {
          mostrarErro('msg-form', resultado.erro || 'Erro ao criar agendamento');
        }
      } catch { mostrarErro('msg-form', 'Erro de conexão'); }
    }

    function togglePerfil() {
      const wrap = document.getElementById('form-perfil-wrap');
      const icon = document.getElementById('perfil-toggle-icon');
      const open = wrap.style.display === 'none' || wrap.style.display === '';
      wrap.style.display = open ? 'block' : 'none';
      icon.textContent = open ? '﹣' : '﹢';
      if (open) {
        document.getElementById('perfil-empresa').value  = fornecedor.nome_empresa || '';
        document.getElementById('perfil-contato').value  = fornecedor.nome_contato  || '';
        document.getElementById('perfil-telefone').value = fornecedor.telefone       || '';
        document.getElementById('perfil-email').value    = fornecedor.email          || '';
      }
    }

    async function salvarPerfil() {
      const nome_empresa = document.getElementById('perfil-empresa').value.trim();
      const nome_contato = document.getElementById('perfil-contato').value.trim();
      const telefone     = document.getElementById('perfil-telefone').value.trim();
      const email        = document.getElementById('perfil-email').value.trim();

      if (!nome_empresa || !nome_contato || !email) {
        mostrarErro('msg-perfil', 'Empresa, contato e email são obrigatórios.');
        return;
      }

      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/fornecedor/perfil`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fornecedor_id: fornecedor.id, nome_empresa, nome_contato, telefone, email })
        });
        const resultado = await res.json();
        if (res.ok) {
          fornecedor = { ...fornecedor, nome_empresa, nome_contato, telefone, email };
          salvarDados(CONFIG.STORAGE.FORNECEDOR, fornecedor);
          document.getElementById('nome-fornecedor').textContent = nome_empresa;
          document.getElementById('user-initial').textContent = nome_empresa.charAt(0);
          mostrarSucesso('msg-perfil', 'Perfil atualizado com sucesso!');
        } else {
          mostrarErro('msg-perfil', resultado.erro || 'Erro ao atualizar perfil');
        }
      } catch { mostrarErro('msg-perfil', 'Erro de conexão'); }
    }

    function toggleSenha() {
      const wrap = document.getElementById('form-senha-wrap');
      const icon = document.getElementById('senha-toggle-icon');
      const open = wrap.style.display === 'none' || wrap.style.display === '';
      wrap.style.display = open ? 'block' : 'none';
      icon.textContent = open ? '﹣' : '﹢';
      if (!open) {
        document.getElementById('senha-atual').value = '';
        document.getElementById('nova-senha').value = '';
        document.getElementById('confirmar-senha').value = '';
        document.getElementById('msg-senha').innerHTML = '';
      }
    }

    async function alterarSenha() {
      const senhaAtual = document.getElementById('senha-atual').value;
      const novaSenha  = document.getElementById('nova-senha').value;
      const confirmar  = document.getElementById('confirmar-senha').value;
      if (!senhaAtual || !novaSenha || !confirmar) { mostrarErro('msg-senha', 'Preencha todos os campos.'); return; }
      if (novaSenha.length < 8) { mostrarErro('msg-senha', 'Nova senha deve ter mínimo 8 caracteres.'); return; }
      if (novaSenha !== confirmar) { mostrarErro('msg-senha', 'As senhas não coincidem.'); return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/fornecedor/alterar-senha`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fornecedor_id: fornecedor.id, senha_atual: senhaAtual, nova_senha: novaSenha })
        });
        const resultado = await res.json();
        if (res.ok) {
          mostrarSucesso('msg-senha', 'Senha alterada com sucesso!');
          document.getElementById('senha-atual').value = '';
          document.getElementById('nova-senha').value = '';
          document.getElementById('confirmar-senha').value = '';
        } else {
          mostrarErro('msg-senha', resultado.erro || 'Erro ao alterar senha');
        }
      } catch { mostrarErro('msg-senha', 'Erro de conexão'); }
    }
  </script>
</body>
</html>
