<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Sistema de Agendamento</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h2>🔐 Login Administrativo</h2>
      
      <div id="mensagem-container"></div>
      
      <form id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="admin@mercado.com" required />
        </div>
        
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="******" required />
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 12px;">
          Entrar
        </button>
        
        <button type="button" class="btn btn-secondary" style="width: 100%;" onclick="window.location.href='index.html'">
          Voltar
        </button>
      </form>
      
      <div class="alert-info" style="margin-top: 20px; font-size: 13px;">
        <strong>Credenciais de teste:</strong><br/>
        admin@mercado.com / 123456
      </div>
    </div>
  </div>
  
  <script src="js/config.js"></script>
  <script src="js/login-admin.js"></script>
</body>
</html>
