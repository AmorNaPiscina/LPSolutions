<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Sistema de Agendamento</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🏪 Sistema de Agendamento - Mercado</h1>
      <div>
        <span style="margin-right: 16px; color: #7f8c8d;">Olá, <strong id="nome-usuario"></strong>!</span>
        <button class="btn btn-danger" onclick="fazerLogout()">Sair</button>
      </div>
    </div>

    <!-- Estatísticas -->
    <div class="stats" id="stats-container"></div>

    <!-- Calendário -->
    <div class="card">
      <h2 style="font-size: 22px; margin-bottom: 16px; color: #2c3e50;">📅 Agenda por Dia</h2>
      
      <div class="filter-tabs">
        <div class="filter-tab active" onclick="filtrarStatus('todos')">Todos</div>
        <div class="filter-tab" onclick="filtrarStatus('Pendente')">Pendentes</div>
        <div class="filter-tab" onclick="filtrarStatus('Aprovado')">Aprovados</div>
      </div>

      <div class="calendar-container" id="calendario"></div>
    </div>

    <!-- Detalhes do Dia -->
    <div id="detalhes-dia" style="display: none;"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/painel-admin.js"></script>
</body>
</html>
